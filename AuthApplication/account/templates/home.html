<!doctype html>
<html lang="en">

<head>
    <title>Home</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

</head>

<body>
    <header>
        <!-- place navbar here -->
        <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
            <div class="container-fluid">
                <a href="{% url 'home' %}" class="navbar-brand">Auth APP</a>
                <ul class="navbar-nav">
                    <li class="navbar-item m-2"><a href="{% url 'profile' %}" class="nav-link">View Profile</a></li>
                    <li class="navbar-item m-2"><a href="{% url 'logout' %}" class="btn btn-danger justify-content-center">Log out</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <h1 class="text-center mt-5">Home Page</h1>

    <h2 class="p-5">Welcome to Home page, <span class="text-primary">{{request.user}}</span></h2>

    {% if messages %}
    {% for i in messages %}
    {% if i.level == DEFAULT_MESSAGE_LEVELS.SUCCESS %}
    <div class="alert alert-success">
        {{ i }}
    </div>
    {% endif %}
    {% if i.level == DEFAULT_MESSAGE_LEVELS.INFO %}
    <div class="alert alert-info">
        {{ i }}
    </div>
    {% endif %}
    {% endfor %}
    {% endif %}
<!-- 
    <h6 class="text-center">
        <a href="{% url 'logout' %}" class="btn btn-danger justify-content-center">Log out</a>
    </h6> -->
</body>
<footer>
    <!-- place footer here -->
</footer>

</html>
